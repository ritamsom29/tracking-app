<!DOCTYPE html>
<html>
<head>

<title>Live Location Sharing</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
background:#1e293b;
padding:40px;
border-radius:12px;
text-align:center;
width:400px;
box-shadow:0px 10px 30px rgba(0,0,0,0.4);
}

h1{
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-bottom:15px;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2563eb;
}

.status{
margin-top:15px;
font-size:14px;
color:#94a3b8;
}

</style>

</head>

<body>

<div class="container">

<h1>Live Location Tracker</h1>

<input id="name" placeholder="Enter your name">

<button onclick="startTracking()">Start Sharing Location</button>

<div class="status" id="status">Waiting to start...</div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();

function startTracking(){

const name = document.getElementById("name").value;

if(!name){
alert("Enter your name");
return;
}

document.getElementById("status").innerText="Sharing location...";

navigator.geolocation.watchPosition((position)=>{

socket.emit("send-location",{
name:name,
latitude:position.coords.latitude,
longitude:position.coords.longitude
});

});

}

</script>

</body>
</html>
