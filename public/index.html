<!DOCTYPE html>
<html>

<head>

<title>Live Location Sharing</title>

<style>

body{
font-family:Arial;
text-align:center;
padding-top:100px;
background:#f5f5f5;
}

.box{
background:white;
padding:40px;
width:400px;
margin:auto;
border-radius:10px;
box-shadow:0px 5px 20px rgba(0,0,0,0.2);
}

.link{
color:blue;
word-break:break-all;
}

</style>

</head>

<body>

<div class="box">

<h2>📍 Live Location Sharing</h2>

<p>Share this link to allow tracking</p>

<p class="link" id="link"></p>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>

const socket = io();

const username = prompt("Enter your name");

navigator.geolocation.watchPosition((position)=>{

const data = {
name: username,
latitude: position.coords.latitude,
longitude: position.coords.longitude
};

socket.emit("send-location", data);

});

</script>

</body>
</html>
