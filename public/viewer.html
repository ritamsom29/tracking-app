<!DOCTYPE html>
<html>
<head>

<title>Tracking Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
display:flex;
height:100vh;
background:#0f172a;
color:white;
}

#sidebar{
width:280px;
background:#1e293b;
padding:20px;
display:flex;
flex-direction:column;
}

#sidebar h2{
text-align:center;
margin-bottom:20px;
}

.stat{
background:#334155;
padding:10px;
border-radius:8px;
margin-bottom:15px;
text-align:center;
}

#userList{
flex:1;
overflow:auto;
}

.user{
padding:12px;
border-bottom:1px solid #475569;
cursor:pointer;
}

.user:hover{
background:#475569;
}

#map{
flex:1;
}

.topbar{
position:absolute;
top:10px;
left:300px;
background:white;
color:black;
padding:10px 20px;
border-radius:8px;
font-weight:bold;
box-shadow:0px 5px 10px rgba(0,0,0,0.2);
z-index:1000;
}

</style>

</head>

<body>

<div id="sidebar">

<h2>GPS Tracking</h2>

<div class="stat">
Active Users: <span id="activeUsers">0</span>
</div>

<div id="userList"></div>

</div>

<div id="map"></div>

<div class="topbar">Real-Time Tracking Dashboard</div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const socket = io();

const map = L.map("map").setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:"OpenStreetMap"
}).addTo(map);

const markers = {};
const users = {};

const userList = document.getElementById("userList");
const activeUsers = document.getElementById("activeUsers");

socket.on("receive-location",(data)=>{

const {id,name,latitude,longitude} = data;

const latlng = [latitude,longitude];

users[id] = {name,latlng};

if(markers[id]){
markers[id].setLatLng(latlng);
}else{

markers[id] = L.marker(latlng)
.addTo(map)
.bindTooltip(name,{
permanent:true,
direction:"top"
});

}

updateUserList();

});

function updateUserList(){

userList.innerHTML="";

const ids = Object.keys(users);

activeUsers.innerText = ids.length;

ids.forEach(id => {

const userDiv = document.createElement("div");

userDiv.className="user";
userDiv.innerText = users[id].name;

userDiv.onclick = ()=>{
map.setView(users[id].latlng,16);
};

userList.appendChild(userDiv);

});

}

</script>

</body>
</html>
