<!DOCTYPE html>
<html>
<head>

<title>Tracking Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
}

#sidebar{
width:300px;
background:#1e293b;
color:white;
padding:20px;
overflow:auto;
}

#sidebar h2{
margin-top:0;
}

.user{
padding:10px;
border-bottom:1px solid #444;
cursor:pointer;
}

.user:hover{
background:#334155;
}

#map{
flex:1;
}

</style>

</head>

<body>

<div id="sidebar">
<h2>Active Users</h2>
<div id="userList"></div>
</div>

<div id="map"></div>

<script src="/socket.io/socket.io.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const socket = io();

const map = L.map("map").setView([20,78],5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:"OpenStreetMap"
}).addTo(map);

const markers = {};
const users = {};
const paths = {};
const polylines = {};

const lastLocation = {};
const lastTime = {};

const userList = document.getElementById("userList");


const carIcon = L.icon({
iconUrl:"https://cdn-icons-png.flaticon.com/512/744/744465.png",
iconSize:[35,35],
iconAnchor:[17,17]
});


function randomColor(){
return "#" + Math.floor(Math.random()*16777215).toString(16);
}


function calculateDistance(lat1,lon1,lat2,lon2){

const R = 6371;

const dLat = (lat2-lat1)*Math.PI/180;
const dLon = (lon2-lon1)*Math.PI/180;

const a =
Math.sin(dLat/2)*Math.sin(dLat/2) +
Math.cos(lat1*Math.PI/180) *
Math.cos(lat2*Math.PI/180) *
Math.sin(dLon/2) *
Math.sin(dLon/2);

const c = 2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));

return R*c;

}


socket.on("receive-location",(data)=>{

const {id,name,latitude,longitude} = data;

const latlng = [latitude,longitude];

users[id] = {name,latlng};


// Marker update
if(markers[id]){

markers[id].setLatLng(latlng);

}else{

markers[id] = L.marker(latlng,{icon:carIcon})
.addTo(map)
.bindTooltip(name,{
permanent:true,
direction:"top"
})
.openTooltip();

}


// ---- ROUTE PATH ----

if(!paths[id]){
paths[id] = [];
}

paths[id].push(latlng);

if(polylines[id]){

polylines[id].setLatLngs(paths[id]);

}else{

polylines[id] = L.polyline(paths[id],{
color:randomColor(),
weight:4
}).addTo(map);

}


// ---- SPEED CALCULATION ----

const now = Date.now();

if(lastLocation[id]){

const dist = calculateDistance(
lastLocation[id][0],
lastLocation[id][1],
latitude,
longitude
);

const timeDiff = (now - lastTime[id]) / 3600000;

const speed = dist / timeDiff;

markers[id].bindPopup(
name + "<br>Speed: " + speed.toFixed(2) + " km/h"
);

}

lastLocation[id] = [latitude,longitude];
lastTime[id] = now;


updateUserList();

});


function updateUserList(){

userList.innerHTML="";

for(const id in users){

const userDiv = document.createElement("div");

userDiv.className="user";
userDiv.innerText = users[id].name;

userDiv.onclick = ()=>{
map.setView(users[id].latlng,16);
};

userList.appendChild(userDiv);

}

}

</script>

</body>
</html>
